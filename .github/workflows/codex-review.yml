name: codex-review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to prepare a detached Codex review request for
        required: true
        type: string

jobs:
  prepare_review_request:
    name: Plus-plan deterministic review request
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Resolve PR head
        id: pr
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('html_url', pr.data.html_url);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('head_sha', pr.data.head.sha);
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Write review request
        run: |
          cat > codex-review-request.md <<'EOF'
          # Codex detached review request

          OPENAI_API_KEY is intentionally not used in this workflow.
          This workflow is deterministic and does not call an AI worker.

          Use Codex Cloud, Codex App, or Codex CLI signed in with ChatGPT to review this PR using the prompt-file below:

          - prompt-file: .github/codex/prompts/review.md
          - PR: ${{ steps.pr.outputs.html_url }}
          - Head branch: ${{ steps.pr.outputs.head_ref }}
          - Head SHA: ${{ steps.pr.outputs.head_sha }}

          The detached review must post pass/reject/block feedback and must not approve or merge the PR.
          EOF
      - name: Post review request comment
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('codex-review-request.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body,
            });
